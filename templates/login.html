<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIGEM — Iniciar Sesión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(160deg, #0D1F14, #142B1D, #091510); min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .card { background: rgba(16, 26, 20, 0.92); border: 1px solid rgba(212,175,55,0.30); border-radius: 14px; padding: 40px; width: 400px; text-align: center; }
        .emblema { width: 72px; height: 72px; border-radius: 50%; background: rgba(212,175,55,0.15); border: 2px solid #D4AF37; color: #D4AF37; font-size: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        h1 { color: white; font-size: 22px; letter-spacing: 3px; margin-bottom: 4px; }
        .subtitulo { color: rgba(255,255,255,0.7); font-size: 11px; margin-bottom: 6px; line-height: 1.5; }
        .pais { color: #D4AF37; font-size: 10px; letter-spacing: 1.5px; margin-bottom: 24px; }
        .instruccion { color: rgba(255,255,255,0.5); font-size: 11.5px; margin-bottom: 16px; }
        .campo { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .campo input { background: transparent; border: none; color: white; font-size: 13.5px; flex: 1; outline: none; }
        .campo input::placeholder { color: rgba(255,255,255,0.45); }
        .campo .icono { color: rgba(255,255,255,0.7); font-size: 15px; }
        .error { background: rgba(163,45,45,0.25); border: 1px solid rgba(163,45,45,0.5); border-radius: 6px; color: #E8A0A0; font-size: 12px; padding: 10px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 13px; background: #40916C; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .btn:hover { background: #52A57E; }
        .separador { height: 1px; background: rgba(255,255,255,0.15); margin: 20px 0 14px; }
        .lema { color: #D4AF37; font-size: 10.5px; letter-spacing: 2px; }
        .version { color: rgba(255,255,255,0.3); font-size: 9.5px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="card">
    <div class="emblema">★</div>
    <h1>SIGEM</h1>
    <p class="subtitulo">Batallón de Infantería Mecanizada<br>"Cnel. Atanasio Girardot"</p>
    <p class="pais">REPÚBLICA BOLIVARIANA DE VENEZUELA</p>
    <p class="instruccion">Ingrese sus credenciales para continuar</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="campo">
            <span class="icono">👤</span>
            <input type="text" name="usuario" placeholder="Usuario" required autofocus>
        </div>
        <div class="campo">
            <span class="icono">🔒</span>
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn">INICIAR SESIÓN</button>
    </form>
    <div class="separador"></div>
    <p class="lema">DISCIPLINA  •  LEALTAD  •  HONOR</p>
    <p class="version">v1.0.0 — Acceso restringido al personal autorizado</p>
</div>
</body>
</html>
